<!doctype html>
<html lang="it" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark light" />
    <!-- Fallback se il CSS non carica: testo sempre leggibile su sfondo scuro -->
    <style>
      /* Prima di React: primary blu (evita flash lime da cache / vecchio tema) */
      html {
        --primary: 221 83% 53% !important;
        --primary-foreground: 0 0% 98% !important;
        --ring: 217 91% 60% !important;
      }
      html.dark,
      html.dark body {
        background-color: #000000;
        color: #fafafa;
      }
      #root {
        min-height: 100dvh;
        min-height: 100vh;
      }
    </style>
    <link rel="icon" type="image/png" href="/images/neuma-logo.png" />
    <link rel="apple-touch-icon" href="/images/neuma-logo.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non blocca il primo paint se fonts.googleapis.com è lento -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <script>
      // OpenCV boot: fetch WASM binary first, then inject opencv.js.
      // This avoids the "sync fetching of the wasm failed" crash on Android Chrome.
      window.__opencv_boot = { errors: [], jsLoaded: false, wasmLoaded: false };

      window.addEventListener("error", function (e) {
        try {
          var msg = (e && e.message) || "script error";
          var src = e && e.filename ? " @ " + e.filename + ":" + (e.lineno || 0) : "";
          window.__opencv_boot.errors.push("JS error: " + msg + src);
        } catch (x) {}
      }, true);
      window.addEventListener("unhandledrejection", function (e) {
        try {
          var r = e && e.reason;
          var msg = r && r.message ? r.message : String(r || "unhandled rejection");
          window.__opencv_boot.errors.push("Promise: " + msg);
        } catch (x) {}
      }, true);

      window.cvReady = false;
      window.Module = {
        onRuntimeInitialized: function () {
          window.cvReady = true;
          console.log("OpenCV WASM caricato localmente!");
          var cv = window.cv;
          if (!cv) return;
          console.log("cv.aruco disponibile:", !!cv.aruco);
          if (!cv.aruco) {
            try {
              var keys = Object.keys(cv);
              console.log("cv keys (" + keys.length + "):", keys.slice(0, 80).join(", "));
              var aliases = ["Aruco", "ARUCO", "aruco_"];
              for (var i = 0; i < aliases.length; i++) {
                if (cv[aliases[i]]) { cv.aruco = cv[aliases[i]]; console.log("aruco alias:", aliases[i]); break; }
              }
              if (cv.aruco && cv.aruco.getPredefinedDictionary) {
                cv.aruco.getPredefinedDictionary(0);
                console.log("ArUco DICT_4X4_50 init OK");
              }
            } catch (e) { console.log("ArUco init attempt:", e && e.message); }
          }
        },
      };

      // Step 1: preload WASM binary so Emscripten never needs a sync XHR.
      // Step 2: only then inject opencv.js (async=false = blocking, safe order).
      fetch("/opencv_js.wasm")
        .then(function (res) {
          if (!res.ok) throw new Error("WASM fetch " + res.status);
          return res.arrayBuffer();
        })
        .then(function (buf) {
          window.Module.wasmBinary = new Uint8Array(buf);
          window.__opencv_boot.wasmLoaded = true;
          var s = document.createElement("script");
          s.id = "opencv-script";
          s.src = "/opencv.js";
          s.type = "text/javascript";
          s.async = false;
          s.onload = function () { window.__opencv_boot.jsLoaded = true; };
          s.onerror = function () { window.__opencv_boot.errors.push("JS load error: /opencv.js"); };
          document.head.appendChild(s);
        })
        .catch(function (e) {
          window.__opencv_boot.errors.push("WASM preload: " + (e && e.message ? e.message : String(e)));
        });
    </script>
    <script>
      console.log("Controllo manuale OpenCV...");
      setTimeout(() => {
        if (window.cv) {
          console.log("CV trovato!");
        } else {
          const extra =
            (window.__opencv_boot && window.__opencv_boot.errors && window.__opencv_boot.errors.length)
              ? "\n" + window.__opencv_boot.errors.slice(-4).join("\n")
              : "";
          alert(
            "ERRORE CRITICO: opencv.js non ha esposto window.cv.\n" +
              "jsLoaded=" + String(!!(window.__opencv_boot && window.__opencv_boot.jsLoaded)) +
              " wasmLoaded=" + String(!!(window.__opencv_boot && window.__opencv_boot.wasmLoaded)) +
              " cvReady=" + String(!!window.cvReady) +
              extra
          );
        }
      }, 6000);
    </script>
    <!-- js-aruco2: pure-JS ArUco detection, no WASM required -->
    <script src="/jsaruco/cv.js"></script>
    <script src="/jsaruco/aruco.js"></script>
    <script src="/jsaruco/aruco_4x4_1000.js"></script>
    <title>NEUMA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
