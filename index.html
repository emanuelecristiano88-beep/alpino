<!doctype html>
<html lang="it" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark light" />
    <!-- Fallback se il CSS non carica: testo sempre leggibile su sfondo scuro -->
    <style>
      /* Prima di React: primary blu (evita flash lime da cache / vecchio tema) */
      html {
        --primary: 221 83% 53% !important;
        --primary-foreground: 0 0% 98% !important;
        --ring: 217 91% 60% !important;
      }
      html.dark,
      html.dark body {
        background-color: #000000;
        color: #fafafa;
      }
      #root {
        min-height: 100dvh;
        min-height: 100vh;
      }
    </style>
    <link rel="icon" type="image/png" href="/images/neuma-logo.png" />
    <link rel="apple-touch-icon" href="/images/neuma-logo.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non blocca il primo paint se fonts.googleapis.com è lento -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <script>
      window.__opencv_boot = { errors: [], jsLoaded: false };
      window.addEventListener(
        "error",
        (e) => {
          try {
            const msg = (e && e.message) || "script error";
            const src = e && e.filename ? ` @ ${e.filename}:${e.lineno || 0}` : "";
            window.__opencv_boot.errors.push(`JS error: ${msg}${src}`);
          } catch {}
        },
        true
      );
      window.addEventListener(
        "unhandledrejection",
        (e) => {
          try {
            const r = e && e.reason;
            const msg = r && r.message ? r.message : String(r || "unhandled rejection");
            window.__opencv_boot.errors.push(`Promise: ${msg}`);
          } catch {}
        },
        true
      );
      window.cvReady = false;
      window.Module = {
        onRuntimeInitialized: function () {
          window.cvReady = true;
          console.log("OPENCV WASM: FULLY INITIALIZED");
        },
        locateFile: function (path) {
          if (path && path.endsWith(".wasm")) return "/opencv_js.wasm";
          return path;
        },
      };
    </script>
    <script src="/opencv.js?v=20260401" type="text/javascript" onload="window.__opencv_boot.jsLoaded=true"></script>
    <script>
      console.log("Controllo manuale OpenCV...");
      setTimeout(() => {
        if (window.cv) {
          console.log("CV trovato!");
        } else {
          const extra =
            (window.__opencv_boot && window.__opencv_boot.errors && window.__opencv_boot.errors.length)
              ? "\n" + window.__opencv_boot.errors.slice(-3).join("\n")
              : "";
          alert(
            "ERRORE CRITICO: opencv.js non ha esposto window.cv.\n" +
              "jsLoaded=" + String(!!(window.__opencv_boot && window.__opencv_boot.jsLoaded)) +
              " cvReady=" + String(!!window.cvReady) +
              extra
          );
        }
      }, 5000);
    </script>
    <title>NEUMA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
