<!doctype html>
<html lang="it" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark light" />
    <!-- Fallback se il CSS non carica: testo sempre leggibile su sfondo scuro -->
    <style>
      /* Prima di React: primary blu (evita flash lime da cache / vecchio tema) */
      html {
        --primary: 221 83% 53% !important;
        --primary-foreground: 0 0% 98% !important;
        --ring: 217 91% 60% !important;
      }
      html.dark,
      html.dark body {
        background-color: #000000;
        color: #fafafa;
      }
      #root {
        min-height: 100dvh;
        min-height: 100vh;
      }
    </style>
    <link rel="icon" type="image/png" href="/images/neuma-logo.png" />
    <link rel="apple-touch-icon" href="/images/neuma-logo.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non blocca il primo paint se fonts.googleapis.com è lento -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <script>
      window.__opencv_boot = { errors: [], jsLoaded: false, wasmLoaded: false };
      window.cvReady = false;
      window.Module = {
        wasmBinaryFile: "/opencv.wasm",
        locateFile: function (path) {
          return path.endsWith(".wasm") ? "/opencv.wasm" : path;
        },
        onRuntimeInitialized: function () {
          window.cvReady = true;
          window.__opencv_boot.wasmLoaded = true;
          console.log("NEUMA: OpenCV Pronto!");
          var cv = window.cv;
          if (!cv) return;
          console.log("cv.aruco:", !!cv.aruco);
          if (!cv.aruco) {
            console.log("ERRORE: Modulo ArUco non presente nel file JS (rilevamento via js-aruco2)");
            try {
              var methods = Object.keys(cv).filter(function(k) { return typeof cv[k] === "function" || typeof cv[k] === "object"; });
              console.log("cv primi 20 metodi/oggetti:", methods.slice(0, 20).join(", "));
            } catch (e) { console.log("cv dump error:", e); }
          }
        },
      };
    </script>
    <script
      src="/opencv.js"
      async
      crossorigin="anonymous"
      id="opencv-script"
      onload="window.__opencv_boot.jsLoaded=true"
      onerror="window.__opencv_boot.errors.push('JS load error: /opencv.js')"
    ></script>
    <!-- js-aruco2: pure-JS ArUco detection, no WASM required -->
    <script src="/jsaruco/cv.js"></script>
    <script src="/jsaruco/aruco.js"></script>
    <script src="/jsaruco/aruco_4x4_1000.js"></script>
    <title>NEUMA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
