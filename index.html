<!doctype html>
<html lang="it" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark light" />
    <!-- Fallback se il CSS non carica: testo sempre leggibile su sfondo scuro -->
    <style>
      /* Prima di React: primary blu (evita flash lime da cache / vecchio tema) */
      html {
        --primary: 221 83% 53% !important;
        --primary-foreground: 0 0% 98% !important;
        --ring: 217 91% 60% !important;
      }
      html.dark,
      html.dark body {
        background-color: #000000;
        color: #fafafa;
      }
      #root {
        min-height: 100dvh;
        min-height: 100vh;
      }
    </style>
    <link rel="icon" type="image/png" href="/images/neuma-logo.png" />
    <link rel="apple-touch-icon" href="/images/neuma-logo.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non blocca il primo paint se fonts.googleapis.com è lento -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <script>
      // OpenCV "old school" boot: preload wasmBinary BEFORE loading opencv.js.
      window.__opencv_boot = { errors: [], jsLoaded: false, wasmLoaded: false };

      window.addEventListener(
        "error",
        (e) => {
          try {
            const msg = (e && e.message) || "script error";
            const src = e && e.filename ? ` @ ${e.filename}:${e.lineno || 0}` : "";
            window.__opencv_boot.errors.push(`JS error: ${msg}${src}`);
          } catch {}
        },
        true
      );
      window.addEventListener(
        "unhandledrejection",
        (e) => {
          try {
            const r = e && e.reason;
            const msg = r && r.message ? r.message : String(r || "unhandled rejection");
            window.__opencv_boot.errors.push(`Promise: ${msg}`);
          } catch {}
        },
        true
      );

      window.cvReady = false;
      window.Module = {
        locateFile: function (path) {
          if (path && path.endsWith(".wasm")) return "/opencv_js.wasm";
          return path;
        },
        onRuntimeInitialized: function () {
          window.cvReady = true;
          console.log("OpenCV con WASM Binary: PRONTO!");
        },
      };

      (async function bootOpenCv() {
        try {
          const res = await fetch("/opencv_js.wasm", { cache: "no-store" });
          if (!res.ok) throw new Error("WASM fetch " + res.status);
          const buf = await res.arrayBuffer();
          // Emscripten accepts ArrayBuffer or Uint8Array; Uint8Array is safest.
          window.Module.wasmBinary = new Uint8Array(buf);
          window.__opencv_boot.wasmLoaded = true;
        } catch (e) {
          try {
            const msg = e && e.message ? e.message : String(e);
            window.__opencv_boot.errors.push("WASM preload: " + msg);
          } catch {}
        }

        try {
          const s = document.createElement("script");
          s.src = "/opencv.js?v=20260401";
          s.type = "text/javascript";
          s.async = false;
          s.onload = function () {
            window.__opencv_boot.jsLoaded = true;
          };
          s.onerror = function () {
            window.__opencv_boot.errors.push("JS load error: /opencv.js");
          };
          document.head.appendChild(s);
        } catch (e) {
          try {
            const msg = e && e.message ? e.message : String(e);
            window.__opencv_boot.errors.push("JS inject: " + msg);
          } catch {}
        }
      })();
    </script>
    <script>
      console.log("Controllo manuale OpenCV...");
      setTimeout(() => {
        if (window.cv) {
          console.log("CV trovato!");
        } else {
          const extra =
            (window.__opencv_boot && window.__opencv_boot.errors && window.__opencv_boot.errors.length)
              ? "\n" + window.__opencv_boot.errors.slice(-4).join("\n")
              : "";
          alert(
            "ERRORE CRITICO: opencv.js non ha esposto window.cv.\n" +
              "jsLoaded=" + String(!!(window.__opencv_boot && window.__opencv_boot.jsLoaded)) +
              " wasmLoaded=" + String(!!(window.__opencv_boot && window.__opencv_boot.wasmLoaded)) +
              " cvReady=" + String(!!window.cvReady) +
              extra
          );
        }
      }, 6000);
    </script>
    <title>NEUMA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
